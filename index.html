/* ---------------- LIVE DATA: Bank of Canada Valet API ---------------- */
function useBoCRate() {
  const [state, setState] = useState({ status: "loading", rate: null, date: null, error: null });

  const fetchRate = useCallback(async () => {
    setState((s) => ({ ...s, status: "loading" }));
    try {
      // V39079 = Bank of Canada target for the overnight rate (policy rate)
      const res = await fetch("https://www.bankofcanada.ca/valet/observations/V39079/json?recent=1");
      if (!res.ok) throw new Error("Network response not ok");
      const json = await res.json();
      const obs = json.observations && json.observations[0];
      if (!obs) throw new Error("No observation returned");
      const rate = parseFloat(obs.V39079.v);
      setState({ status: "ready", rate, date: obs.d, error: null });
    } catch (e) {
      setState({ status: "error", rate: null, date: null, error: e.message });
    }
  }, []);

  useEffect(() => { fetchRate(); }, [fetchRate]);

  return { ...state, refresh: fetchRate };
}

                        {item.category.toUpperCase()}
                      </span>
                      <span className="mono" style={{ padding: "2px 8px", background: ic.bg, color: ic.text, border: `1px solid ${ic.border}`, borderRadius: 4, fontSize: 9, fontWeight: 700 }}>
                        {item.impact.toUpperCase()}
                      </span>
                    </div>
                    <div className="mono" style={{ fontSize: 10, color: "#475569", marginTop: 8 }}>{item.date}</div>
                    <h3 style={{ fontSize: 15, fontWeight: 700, color: "#f1ede4", margin: "4px 0 7px", lineHeight: 1.3 }}>{item.title}</h3>
                    <p style={{ fontSize: 12.5, color: "#94a3b8", margin: "0 0 10px", lineHeight: 1.6 }}>{item.summary}</p>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span className="mono" style={{ fontSize: 10, color: "#475569" }}>{item.source}</span>
                      <a href={item.url} target="_blank" rel="noopener noreferrer" className="mono"
                        style={{ padding: "6px 12px", background: "#0f1117", border: "1px solid #2a2f3e", borderRadius: 5, fontSize: 10, color: "#93c5fd", textDecoration: "none" }}>
                        SOURCE →
                      </a>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        <div style={{ marginTop: 30, paddingTop: 16, borderTop: "1px solid #2a2f3e", textAlign: "center" }}>
          <div className="mono" style={{ fontSize: 10, color: "#475569", lineHeight: 1.8 }}>
            Static data: CREA · NAR · RE/MAX · CMHC · Niagara Region ({DATA_VINTAGE})<br/>
            Live: Bank of Canada Valet API<br/>
            Not financial advice.
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
